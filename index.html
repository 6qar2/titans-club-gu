<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITANS CLUB | GALALA UNIVERSITY</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --black: #0B0B0B;
  --red: #C0001A;
  --gold: #D4AF37;
  --white: #F0EDE8;
}
*{margin:0;padding:0;box-sizing:border-box}
body { 
    background: var(--black); 
    color: var(--white); 
    font-family: 'Barlow Condensed', sans-serif; 
    overflow-x: hidden;
}

/* SMOOTH SPLASH LAYER */
#splash {
    position: fixed; 
    inset: 0; 
    background: #000;
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center;
    z-index: 999999;
    opacity: 1;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); /* Professional easing */
    pointer-events: all;
}

/* Content starts blurred and scaled down for a "reveal" effect */
#main-content { 
    opacity: 0; 
    transform: scale(0.98);
    filter: blur(10px);
    transition: opacity 1.2s ease, transform 1.2s ease, filter 1.2s ease;
    height: 100vh;
    overflow: hidden; /* Prevent scroll until enter */
}

/* When active, everything snaps into place */
#main-content.active {
    opacity: 1;
    transform: scale(1);
    filter: blur(0px);
    height: auto;
    overflow: visible;
}

.enter-btn {
    background: none; 
    border: 1px solid var(--red); 
    color: white;
    padding: 18px 50px; 
    font-family: 'Bebas Neue'; 
    font-size: 1.5rem;
    cursor: pointer; 
    letter-spacing: 6px; 
    transition: 0.4s;
    text-transform: uppercase;
}
.enter-btn:hover { 
    background: var(--red); 
    box-shadow: 0 0 40px rgba(192, 0, 26, 0.6); 
}

/* DESIGN ELEMENTS */
.hero {
  height: 100vh; 
  display: flex; 
  flex-direction: column; 
  justify-content: center;
  align-items: center; 
  text-align: center; 
  background: radial-gradient(circle, #250000, #0b0b0b);
}
.hero img { width: 220px; margin-bottom: 2rem; }
.hero h1 { font-family: 'Bebas Neue'; font-size: clamp(3.5rem, 9vw, 8rem); line-height: 0.9; }

.section { max-width: 1100px; margin: auto; padding: 6rem 5%; border-bottom: 1px solid #1a1a1a; }
.label { color: var(--red); letter-spacing: 5px; font-size: 0.8rem; margin-bottom: 1.5rem; display: block; }
h2 { font-family: 'Bebas Neue'; font-size: clamp(3rem, 6vw, 5rem); margin-bottom: 2.5rem; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
.card { background: #111; border: 1px solid #222; overflow: hidden; position: relative; transition: 0.3s; }
.card img { width: 100%; height: 400px; object-fit: cover; filter: grayscale(100%); transition: 0.6s; }
.card:hover img { filter: grayscale(0%); }
.card-info { padding: 1.5rem; }
.name { font-family: 'Bebas Neue'; font-size: 2rem; }

/* SOCIAL */
.social { position: fixed; right: 25px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
.social a { color: #555; text-decoration: none; font-family: 'Bebas Neue'; writing-mode: vertical-rl; transition: 0.3s; font-size: 0.9rem; letter-spacing: 2px;}
.social a:hover { color: var(--red); }
</style>
</head>
<body>

<div id="splash">
    <img src="club-logo.png" style="width: 130px; margin-bottom: 25px;">
    <button class="enter-btn" onclick="smoothStart()">ENTER</button>
</div>

<div class="social">
    <a href="https://www.instagram.com/titans.gu" target="_blank">INSTAGRAM</a>
    <a href="https://www.tiktok.com/@titans.gu" target="_blank">TIKTOK</a>
</div>

<audio id="bgAudio" loop><source src="bg-music.mp3" type="audio/mpeg"></audio>

<div id="main-content">
    <div class="hero">
        <img src="club-logo.png">
        <h1>TITANS CLUB<br><span style="color:var(--red)">GALALA</span></h1>
        <p style="letter-spacing: 8px; color: #555; font-weight: 300;">LEADERSHIP · DISCIPLINE · EXCELLENCE</p>
    </div>

    <div class="section">
        <span class="label">01 // CODE</span>
        <h2>OUR PHILOSOPHY</h2>
        <p style="font-size: 1.8rem; color: #bbb; line-height: 1.4;">Titans Club builds elite students through discipline, execution, and accountability.</p>
    </div>

    <div class="section">
        <span class="label">02 // COMMAND</span>
        <h2>LEADERSHIP</h2>
        <div class="grid">
            <div class="card" style="grid-column: 1/-1; border-color: var(--gold);">
                <img src="hesham.jpeg">
                <div class="card-info">
                    <span style="color:var(--gold); font-size: 0.8rem; letter-spacing: 2px;">FOUNDER & PRESIDENT</span>
                    <div class="name">HESHAM YASSER</div>
                </div>
            </div>
            </div>
    </div>
</div>

<script>
function smoothStart() {
    const splash = document.getElementById('splash');
    const main = document.getElementById('main-content');
    const audio = document.getElementById('bgAudio');

    // 1. Play Audio
    if (audio) {
        audio.volume = 0.5;
        audio.play().catch(() => console.log("Audio interaction required"));
    }

    // 2. Trigger Smooth CSS transitions
    splash.style.opacity = '0';
    splash.style.pointerEvents = 'none'; // Allow clicking through immediately
    
    main.classList.add('active');

    // 3. Clean up the DOM after animation finishes
    setTimeout(() => {
        splash.style.display = 'none';
    }, 800);
}
</script>
</body>
</html>
